apiVersion: meta.pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-cloudinaryprovisioning
  annotations:
    meta.crossplane.io/maintainer: NitriKx <benoit.sauvere@backmarket.com>
    meta.crossplane.io/source: github.com/NitriKx/provider-cloudinary-provisioning
    meta.crossplane.io/license: Apache-2.0
    meta.crossplane.io/description: |
      Crossplane provider for Cloudinary Provisioning API. Manages API access keys,
      custom policies, and role assignments at the Cloudinary account level.
    meta.crossplane.io/readme: |
      # provider-cloudinary-provisioning

      Manages Cloudinary account-level resources (access keys, custom policies,
      role assignments) via the Cloudinary Provisioning API.
      See the [README](https://github.com/NitriKx/provider-cloudinary-provisioning)
      for setup instructions and examples.
    meta.crossplane.io/iconData: 
spec:
  crossplane:
    version: ">=v1.14.0-0"
  controller:
    image: ghcr.io/nitrikx/provider-cloudinary-provisioning:latest
  capabilities:
    - SafeStart
